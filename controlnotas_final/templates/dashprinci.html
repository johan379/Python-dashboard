<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; }
        nav {
            background:#1E1BD2; color:white; padding:12px 24px;
            display:flex; justify-content:space-between; align-items:center;
            position:fixed; top:0; width:100%; z-index:1000;
            box-shadow:0 2px 8px rgba(0,0,0,0.3);
        }
        .nav-brand { font-size:18px; font-weight:bold; }
        .nav-user   { font-size:14px; opacity:.85; }
        .nav-links  { display:flex; gap:10px; align-items:center; }
        .btn-nav {
            padding:8px 16px; border-radius:6px; text-decoration:none;
            font-size:14px; font-weight:bold; transition:opacity .2s;
        }
        .btn-nav:hover { opacity:.85; }
        .btn-reg    { background:#2ecc71; color:white; }
        .btn-carga  { background:#e67e22; color:white; }
        .btn-logout { background:#e74c3c; color:white; }
        iframe {
            display:block; border:none;
            width:100%; height:calc(100vh - 56px);
            margin-top:56px;
        }
    </style>
</head>
<body>
    <nav>
        <span class="nav-brand">Control de Notas </span>
        <span class="nav-user">👤 {{ usuario }}</span>
        <div class="nav-links">
            <a href="/registro_estudiante" class="btn-nav btn-reg"> Registrar</a>
            <a href="/cargamasiva"         class="btn-nav btn-carga"> Cargar Excel</a>
            <a href="/logout"              class="btn-nav btn-logout"> Salir</a>
        </div>
    </nav>
    <iframe src="/dashprincipal/" title="Dashboard"></iframe>
</body>
</html>
